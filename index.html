<style>

label {
  font-size: 32px;
  font-weight: bold;
}

select {
  width: 100%;
  margin: 20px 0;
  padding: 55px;
  font-size: 34px;
  border-radius: 20px;
}

button {
  padding:70px;
  font-size:34px;
  border-radius:24px;
  background:#25D366;
  color:#fff;
  width:100%;
}

.input-jalur {
  width: 100%;
  margin: 15px 0;
  padding: 28px;
  font-size: 24px;

.checkbox {

<select id="plr1" onchange="syncAll()"></select>

<label>PLR 2</label>

<select id="m_plr" style="display:none;" onchange="syncAll()"></select>

<label>PRS</label>
<select id="prs" onchange="syncAll()"></select>
<input type="checkbox" class="checkbox" id="chk_prs" onchange="toggle('prs')"> Job PRS
<select id="m_prs" style="display:none;" onchange="syncAll()"></select>

<label>KAMTIB</label>
<select id="sec"></select>

<select id="cuaca">
<option value="">Pilih Cuaca</option>
<option>Cerah</option>
<option>Berawan</option>
<option>Hujan</option>
</select>

<input id="j1" class="input-jalur" placeholder="Jalur I">
<input id="j2" class="input-jalur" placeholder="Jalur II">
<input id="j3" class="input-jalur" placeholder="Jalur III">

<button onclick="kirimWA()">Kirim Laporan Dinas</button>

/* ROLE TERPISAH */
const ROLE = {
ppka: ["Hendi Putra","Wahyu Ramanda","Makmun","Nicko Ramadhan","Akhirudin Akbar","Bambang Ardiansyah"],
plr: ["Iqbal Mohamad Alim","Diky Yoga Pratama","Nandika Maulana","Eric Fadhilah Nopani","Oktapian Cahaya Bangun","Fajar Prayogo","Sujono","Deny Setiawan","Akhirudin Akbar","Bambang Ardiansyah"],
prs: ["APRIANDI","M. Fachri Fane","Ratanca Yuda","Tri Ramadani","Akhirudin Akbar","Bambang Ardiansyah"]
};

/* LOAD */
function load(id,list){
let el=document.getElementById(id);
el.innerHTML='<option value="">-- pilih --</option>';
list.forEach(n=>{
let o=document.createElement("option");
o.value=n;
o.text=n;
el.appendChild(o);
});
}

load("ppka",ROLE.ppka);
load("plr1",ROLE.plr);
load("plr2",ROLE.plr);
load("prs",ROLE.prs);
load("sec",Object.keys(KAMTIB));
load("m_ppka",Object.keys(MAGANG));
load("m_plr",Object.keys(MAGANG));
load("m_prs",Object.keys(MAGANG));

function toggle(r){
document.getElementById("m_"+r).style.display =
document.getElementById("chk_"+r).checked ? "block":"none";
}

/* ANTI DOUBLE GLOBAL */
function syncAll(){
let ids=["ppka","plr1","plr2","prs","m_ppka","m_plr","m_prs"];
let used=[];

ids.forEach(id=>{
let v=document.getElementById(id).value;
if(v) used.push(v);
});

ids.forEach(id=>{
let el=document.getElementById(id);
for(let opt of el.options){
if(!opt.value) continue;
opt.disabled = used.includes(opt.value) && opt.value!==el.value;
}
});
}

/* VALID */
function valid(){
let ids=["shift","ppka","plr1","plr2","prs","sec","cuaca"];
let ok=true;
ids.forEach(id=>{
let el=document.getElementById(id);
if(!el.value){ el.classList.add("error"); ok=false;}
else el.classList.remove("error");
});
return ok;
}

/* MAIN */
function kirimWA(){

if(!valid()) return;

let shift=document.getElementById("shift").value;
let cuaca=document.getElementById("cuaca").value;

let ppka=document.getElementById("ppka").value;
let plr1=document.getElementById("plr1").value;
let plr2=document.getElementById("plr2").value;
let prs=document.getElementById("prs").value;
let sec=document.getElementById("sec").value;

let txt=`*Laporan ${shift} Stasiun Banjarsari*
Hari/Tanggal : ${new Date().toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}

A. PERKA & LANGSIRAN : Mancarli
■ PPKA : ${ppka}
HP : ${ORANG[ppka]}`;

if(chk_ppka.checked){
let m=document.getElementById("m_ppka").value;
if(m) txt+=`\n■ Job PPKA : ${m}\nHP : ${MAGANG[m]}`;
}

txt+=`

■ PLR 1 : ${plr1}
HP : ${ORANG[plr1]}
■ PLR 2 : ${plr2}
HP : ${ORANG[plr2]}`;

if(chk_plr.checked){
let m=document.getElementById("m_plr").value;
if(m) txt+=`\n■ Job PLR : ${m}\nHP : ${MAGANG[m]}`;
}

txt+=`

■ PRS : ${prs}
HP : ${ORANG[prs]}`;

if(chk_prs.checked){
let m=document.getElementById("m_prs").value;
if(m) txt+=`\n■ Job PRS : ${m}\nHP : ${MAGANG[m]}`;
}

txt+=`

Kondisi Perka Singkat :
■ Administrasi Perka Tertib
■ Kondisi Peralatan  Baik 

B. KAMTIB :
■ Security : ${sec}
HP : ${KAMTIB[sec]}

C. Cuaca : ${cuaca}

*Update Posisi Jalur Banjarsari :*
■ Jalur I : ${j1.value||"Kosong"}
■ Jalur II : ${j2.value||"Kosong"}
■ Jalur III : ${j3.value||"Kosong"}
■ Jalur Badug : ${j4.value||"Kosong"}

Demikian Laporan ${shift} Stasiun Banjarsari, Terima Kasih.`;

window.open("https://wa.me/62882009330707?text="+encodeURIComponent(txt));
}
